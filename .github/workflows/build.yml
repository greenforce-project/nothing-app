name: Build nothing

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew clean :app:assembleRelease --no-daemon --stacktrace

      - name: Prepare APK artifact
        run: |
          APK_PATH="$(find app/build/outputs/apk/release \
            -type f -name '*.apk' | head -n 1)"

          if [ -z "$APK_PATH" ]; then
            echo "Release APK was not found."
            exit 1
          fi

          mkdir -p artifacts

          cp "$APK_PATH" \
            "artifacts/nothing-release-${{ github.run_number }}.apk"

          ls -lh artifacts

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nothing-release-${{ github.run_number }}
          path: artifacts/*.apk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
