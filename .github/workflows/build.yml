name: Build nothing

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew clean assembleRelease --no-daemon

      - name: Rename APK
        run: |
          APK_PATH="$(find app/build/outputs/apk/release \
            -type f -name '*.apk' | head -n 1)"

          if [ -z "$APK_PATH" ]; then
            echo "Release APK was not found."
            exit 1
          fi

          cp "$APK_PATH" nothing-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nothing-release
          path: nothing-release.apk
          if-no-files-found: error
